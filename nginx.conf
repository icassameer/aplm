# ─── ICA CRM — Nginx Production Config ───────────────────────────────────────
# Place at: /etc/nginx/sites-available/ica-crm
# Enable:   sudo ln -s /etc/nginx/sites-available/ica-crm /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name crm.icaweb.in;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.icaweb.in;

    # SSL — managed by Certbot (auto-filled after: sudo certbot --nginx -d crm.icaweb.in)
    # ssl_certificate /etc/letsencrypt/live/crm.icaweb.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.icaweb.in/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-src 'none';" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ─── Proxy to Node.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # File upload size limit (for audio files)
        client_max_body_size 50M;
    }

    # ─── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Block suspicious paths ───────────────────────────────────────────────
    location ~ /\. { deny all; }
    location ~ /(\.env|\.git|package\.json|node_modules) { deny all; return 404; }
}
